name: Derive signal drafts

on:
  schedule:
    - cron: '45 21 * * *'   # 06:45 KST · 1일 1회 (update-news 8분 뒤)
  workflow_dispatch: {}      # 수동 실행도 가능 (첫 실행 권장)

permissions:
  contents: write

concurrency:
  group: derive-drafts
  cancel-in-progress: false

jobs:
  drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Derive signal drafts from news.json
        run: node scripts/derive-drafts.mjs
      - name: Commit & push if changed (rebase-safe)
        run: |
          FILE="signal_drafts.json"
          if [ -z "$(git status --porcelain "$FILE")" ]; then
            echo "No change in $FILE."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: derive signal drafts from news"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main \
               && git push origin HEAD:main; then
              echo "pushed on attempt $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i lost the race; backing off"; sleep $(( RANDOM % 6 + 3 ))
          done
          echo "::error::push failed after 5 attempts"; exit 1
