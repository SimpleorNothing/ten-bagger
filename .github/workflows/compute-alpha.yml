name: Compute alpha map

# 주 1회 자동(매주 토요일 08:30 KST) + Actions 탭 수동 실행.
on:
  schedule:
    - cron: '30 23 * * 5'   # 토 08:30 KST (금 23:30 UTC) · 주 1회
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: compute-alpha
  cancel-in-progress: false

jobs:
  alpha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compute alpha estimates
        run: node scripts/compute-alpha.mjs
        env:
          # Optional: lets the script add the tracker's 초입 5신호 into the estimate.
          # Add these in repo Settings → Secrets and variables → Actions.
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
      - name: Commit & push if changed (rebase-safe)
        run: |
          FILE="alpha.json"
          if [ -z "$(git status --porcelain "$FILE")" ]; then
            echo "No change in $FILE."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: recompute alpha map estimates"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main \
               && git push origin HEAD:main; then
              echo "pushed on attempt $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i lost the race; backing off"; sleep $(( RANDOM % 6 + 3 ))
          done
          echo "::error::push failed after 5 attempts"; exit 1
