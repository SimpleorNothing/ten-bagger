name: Update news feed

on:
  schedule:
    - cron: '37 21 * * *'   # 06:37 KST · 1일 1회
  workflow_dispatch: {}      # 수동 실행도 가능 (첫 실행 권장)

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/wizardly-rubin-SubA1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest news
        run: node scripts/fetch-news.mjs
      - name: Commit & push if changed (rebase-safe)
        run: |
          FILE="news.json"
          if [ -z "$(git status --porcelain "$FILE")" ]; then
            echo "No change in $FILE."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: update news feed"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin claude/wizardly-rubin-SubA1 \
               && git push origin HEAD:claude/wizardly-rubin-SubA1; then
              echo "pushed on attempt $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i lost the race; backing off"; sleep $(( RANDOM % 6 + 3 ))
          done
          echo "::error::push failed after 5 attempts"; exit 1
