name: Update news feed

on:
  schedule:
    - cron: '50 21 * * *'   # 06:50 KST · 미국장 마감 후
    - cron: '50 9 * * *'    # 18:50 KST · 한국장 마감 후
  workflow_dispatch: {}      # 수동 실행도 가능 (첫 실행 권장)

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/wizardly-rubin-SubA1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest news
        run: node scripts/fetch-news.mjs
      - name: Commit news.json if changed
        run: |
          if [ -n "$(git status --porcelain news.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add news.json
            git commit -m "chore: update news feed"
            git push origin HEAD:claude/wizardly-rubin-SubA1
          else
            echo "No news change."
          fi
