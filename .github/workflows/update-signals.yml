name: Update macro signals

on:
  schedule:
    - cron: '47 21 * * *'    # 06:47 KST · 1일 1회 (시세 06:37·뉴스 06:42와 분산 — 같은 브랜치 push 충돌 방지)
  workflow_dispatch: {}        # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch macro signals (VIX · S&P · CNN F&G)
        run: node scripts/fetch-signals.mjs
      - name: Commit & push if changed (rebase-safe)
        run: |
          FILE="signals.json"
          if [ -z "$(git status --porcelain "$FILE")" ]; then
            echo "No change in $FILE."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "chore: update macro signals (VIX·S&P·F&G)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main \
               && git push origin HEAD:main; then
              echo "pushed on attempt $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i lost the race; backing off"; sleep $(( RANDOM % 6 + 3 ))
          done
          echo "::error::push failed after 5 attempts"; exit 1
