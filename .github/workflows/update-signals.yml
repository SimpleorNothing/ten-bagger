name: Update macro signals

on:
  schedule:
    - cron: '37 21 * * *'    # 06:37 KST · 1일 1회
  workflow_dispatch: {}        # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/wizardly-rubin-SubA1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch macro signals (VIX · S&P · CNN F&G)
        run: node scripts/fetch-signals.mjs
      - name: Commit signals.json if changed
        run: |
          if [ -n "$(git status --porcelain signals.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add signals.json
            git commit -m "chore: update macro signals (VIX·S&P·F&G)"
            git push origin HEAD:claude/wizardly-rubin-SubA1
          else
            echo "No signal change."
          fi
